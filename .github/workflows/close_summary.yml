# Required GitHub Secrets:
#   GMAIL_ADDRESS
#   GMAIL_APP_PASSWORD
#   TO_EMAIL
#   FMP_API_KEY        ← primary market data (free at financialmodelingprep.com)
#   NEWS_API_KEY       ← optional headline fallback (free at newsapi.org)

name: Pippy's Brief — Close

on:
  # Triggered externally by cron-job.org at 4:00 PM ET (= 3:00 PM CT) — market close.
  # Market hours are Eastern Time (NYSE). 4:00 PM ET = 20:00 UTC summer (EDT, UTC-4) / 21:00 UTC winter (EST, UTC-5).
  # cron-job.org job is set to 3:00 PM CT, which equals 4:00 PM ET — market close.
  # Weekdays only. Workflow internally skips on holidays and if market still open.
  # Uses workflow_dispatch for reliable exact-time delivery.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-close-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run close summary
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
          FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
        run: python openbell.py close

      - name: Commit updated memory
        run: |
          git config user.name "Pippy"
          git config user.email "pippy@openbell.ai"
          git add pippy_memory.json
          git diff --staged --quiet || git commit -m "Pippy memory — close summary $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
