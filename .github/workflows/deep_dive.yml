# Required GitHub Secrets:
#   GMAIL_ADDRESS
#   GMAIL_APP_PASSWORD
#   TO_EMAIL
#   FMP_API_KEY        ← primary market data (free at financialmodelingprep.com)
#   NEWS_API_KEY       ← optional headline fallback (free at newsapi.org)

name: Pippy's Brief — Weekend

on:
  schedule:
    # 8:30 AM CDT (UTC-5, Mar-Nov) = 13:30 UTC — every day; skips automatically if market is open
    # NOTE: This cron is set for CDT (UTC-5), active March-November.
    # When CST (UTC-6) begins in November, this will fire 1 hour late again
    # unless adjusted to '30 14 * * *' for winter months.
    - cron: '30 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-deep-dive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deep dive if market closed
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
          FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
        run: python openbell.py deepdive

      - name: Commit updated memory
        run: |
          git config user.name "Pippy"
          git config user.email "pippy@openbell.ai"
          git add pippy_memory.json
          git diff --staged --quiet || git commit -m "Pippy memory — deep dive $(date +'%Y-%m-%d')"
          git push
