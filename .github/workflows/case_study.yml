# Required GitHub Secrets:
#   GMAIL_ADDRESS
#   GMAIL_APP_PASSWORD
#   TO_EMAIL
#   FMP_API_KEY        ← primary market data (free at financialmodelingprep.com)
#   NEWS_API_KEY       ← optional headline fallback (free at newsapi.org)
#
# NOTE: this workflow sends zero market data — FMP/NEWS_API_KEY are unused by
# `casestudy` mode specifically, but are listed since this repo's install step
# is shared across all three workflows.

name: Pippy's Brief — Case Study

on:
  # Triggered externally by cron-job.org at two separate times — 12:00 PM CT on
  # weekdays and 8:30 AM CT on weekends — same pattern as morning_brief and
  # close_summary. See the repo README / setup notes for the exact cron-job.org
  # configuration (two jobs pointing at this one workflow's workflow_dispatch
  # endpoint). No native schedule: trigger — confirmed via duplicate sends that
  # GitHub's native cron fires up to ~1hr late and double-sends alongside the
  # on-time cron-job.org call. cron-job.org has proven reliable for both
  # schedules, so it's the sole trigger.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-case-study:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run case study
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
          FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
        run: python openbell.py casestudy

      - name: Commit updated case study history
        run: |
          git config user.name "Pippy"
          git config user.email "pippy@openbell.ai"
          git add case_study_history.json pippy_memory.json
          git diff --staged --quiet || git commit -m "Pippy case study history — $(date +'%Y-%m-%d %H:%M')"
          git pull --rebase origin main
          git push
